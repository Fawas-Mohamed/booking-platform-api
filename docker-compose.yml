version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: booking-platform-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking-platform-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/booking_platform?schema=public
      JWT_SECRET: change-this-to-a-long-random-secret-in-production
      JWT_EXPIRES_IN: 1d
    ports:
      - '3000:3000'
    command: sh -c "npx prisma migrate deploy && node dist/main"

volumes:
  postgres_data:
